<!DOCTYPE html>
<html lang="en">
     <head> 
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <link rel="stylesheet" href="pyjama-style.css"/>
    </head>
    
    <body>
    <!-- HOME button for users to go back-->
     <header class="site-header">
        <nav class="nav-links">
            <a href="index.html">
                 <img src="assets/home.png" alt="Home">
            </a>
        <a href="sets.html" >SETS</a>
            <span>|</span>
            <a href="robes.html" >ROBES</a>
            <span>|</span>
            <a href="night-dresses.html" >NIGHT DRESSES</a>
            <span>|</span>
            <a href="sale.html" >SALE</a>
        </nav>
                <!--search bar group-->
         <div class="search-container">
            <form class="search-form" action="products.html" method="get">
                <input type="text" id="searchInput" placeholder="Search..." name="search" >
                <button type="submit" class="search-button">
                    <img src="assets/search-icon.png" alt="Search">
                </button>
            </form>
         </div>

        <!--HEADER on the TOP RIGHT-->
        <!--favourite-->
         <div class="header-icons">
            <button type="button" class="icon-btn">
                <img src="assets/favorite.png" alt="favourites">
            </button>
        <!--cart-->
            <a href="shopping-cart.html" class="icon-btn">
                <img src="assets/cart.png" alt="cart">
            </a>
         </div>
     </header>

     <!-- SALE collection-->
      <section id="sale-products" class="products">
                <h2> Sale</h2>
                <div class="product-row">

                    <!--SALE-->
                    <div class="product-card" data-name="full white button long pyjama set sale">
                        <a href="product-white-long-sale.html" class="product-link">
                        <img src="assets/sale/full-white-pyjama-sale.jpg" alt="White Pyjama">
                        </a>
                        
                        <button
                        type="button"
                        class="favorite-btn"
                        data-name="White Pyjama"
                        data-price="50"
                        data-image="assets/sale/full-white-pyjama-sale.jpg"
                        data-link="product-white-long-sale.html">
                        <img src="assets/heart-hollow.png" alt="add to favourites">
                        </button>

                        <div class="product-info">
                            <p>White Pyjama</p>

                            <div class="price-group">
                                <span class="original-price">$89</span> 
                                <span class="sale-price">$50</span>
                            </div>
                           
                        </div>
                    </div>

                    <div class="product-card" data-name="short camisole pink pyjama set sale">
                        <a href="product-camisole-sale.html" class="product-link">
                        <img src="assets/sale/short-comisole-set-sale.jpg" alt="Short Camisole Set">
                        </a>
                        
                        <button
                        type="button"
                        class="favorite-btn"
                        data-name="Short Camisole Set"
                        data-price="50"
                        data-image="assets/sale/short-comisole-set-sale.jpg"
                        data-link="product-camisole-sale.html">
                        <img src="assets/heart-hollow.png" alt="add to favourites">
                        </button>

                        <div class="product-info">
                            <p>Short Camisole Set</p>
                            
                            <div class="price-group">
                                <span class="original-price">$89</span> 
                                <span class="sale-price">$50</span>
                            </div>

                </div>
      </section>
      <script src="script.js"></script>
