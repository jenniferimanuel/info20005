<!DOCTYPE html>
<html lang="en">
    <head> 
        <meta charset="UTF-8">
        <meta name="viewport" content=""width=device-width, initial-scale="1.0" />
        <title> Midsummer Night's Dream</title>

        <link rel="stylesheet" href="style.css"/>
    </head>

    <body>
        <!--left top header, desktop view-->
        <header class="site-header">
            <nav class="nav-links">
                <a href="#pyjama-collections" >PYJAMAS</a>
                <a href="#sets" >SETS</a>
                <a href="#robes" >ROBES</a>
                <a href="#night-dresses" >NIGHT DRESSES</a>
                <a href="#sale" >SALE</a>
            </nav>

        <!--search bar group-->
         <div class="search-container">
            <form class="search-form">
                <img src="assets/search-icon.png" alt="search-icon.png" alt="search icon" class="search-icon">
                <input type="text" id="searchInput" placeholder="Search..." name="Search" >
                <button type="submit">Search</button>
            </form>
         </div>

        <!--header on the top right-->
        <!--favourite-->
         <div class="header-icons">
            <button type="button" class="icon-btn">
                <img src="assets/favorite.png" alt="favourites">
            </button>
        <!--cart-->
            <button type="button" class="icon-btn">
                <img src="assets/cart.png" alt="cart">
            </button>
         </div>

        </header>

        <main>
            <!--hero image-->
            <section class="hero">
                <div class="hero-content">
                    <h1>Midsummer<br>Night's Dream</h1>
                    <a href="hero-image.jpg" class="shop-button">SHOP NOW</a>
                </div>
            </section>

            <!--collections-->
            <section id="pyjama-collections" class="collections">
                <h2>Collections</h2>
                <!--Sets-->
                <div class="collection-row">
                    <div id="sets" class="collection-card">
                        <img src="assets/sets-collection.jpg" alt="sets collection">
                        <a href="#products">SETS</a>
                    </div>
                <!--Robes-->
                <div id="robes" class="collection-card">
                    <img src="assets/robe-collection.jpg" alt="robes collection">
                    <a href="#products">ROBES</a>
                </div>
                <!--Night-Dresses-->
                <div id="night-dresses" class="collection-card">
                    <img src="assets/nightdress-collection.jpg" alt="night dresses collection">
                    <a href="#products">NIGHT DRESSES</a>
                </div>
                <!--Sale-->
                <div id="sale" class="collection-card">
                    <img src="assets/sale-collection.jpg" alt="sale collection">
                    <a href="#products">SALE</a>
                </div>
                </div>
            </section>

            <!--all products section-->
            <section id="products" class="products">
                <h2>Products</h2>

                <div class="product-row">
                    <div class="product-card">
                        <img src="/Users/jenniferimanuel/Downloads/UniMelb/Year 2 -2/INFO20005/Project 3/assets/set/white button up long-set.jpg" alt="White Button Up Long Pyjama Set">
                        <div class="product-info">
                            <p>White Button Up Long Pyjama Set</p>
                            <p>$110</p>
                        </div>
                    </div>

                    <div class="product-card">
                        <img src="/Users/jenniferimanuel/Downloads/UniMelb/Year 2 -2/INFO20005/Project 3/assets/set/libra zodiac set.jpg" alt="Libra Zodiac Short Pajama Set">
                        <div class="product-info">
                            <p>Libra Zodiac Pajama Set</p>
                            <p>$89</p>
                        </div>
                    </div>

                     <div class="product-card">
                        <img src="/Users/jenniferimanuel/Downloads/UniMelb/Year 2 -2/INFO20005/Project 3/assets/night dress/silk lace slip-night dress.jpg" alt="Silk Lace Slip Night Dress">
                        <div class="product-info">
                            <p>Silk Lace Slip Night Dress</p>
                            <p>$76</p>
                        </div>
                    </div>

                    <div class="product-card">
                        <img src="/Users/jenniferimanuel/Downloads/UniMelb/Year 2 -2/INFO20005/Project 3/assets/robe/kimono-robe.jpg" alt="Kimono Yellow Robe">
                        <div class="product-info">
                            <p>Kimono Yellow Robe</p>
                            <p>$120</p>
                        </div>
                    </div>

                </div>
            </section>

        </main>

        <footer>
            <p>2026 Midsummer Night's Dream</p>
        </footer>
    </body>
</html>
